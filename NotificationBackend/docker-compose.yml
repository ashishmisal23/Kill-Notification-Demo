version: '3.8'
services:
  api:
    build: .
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/notification_demo
      - FIREBASE_SERVICE_ACCOUNT_PATH=/run/secrets/firebase_service_account.json
    depends_on:
      - mongo
  mongo:
    image: mongo:6.0
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
